name: Clone FSQ with Git Xet

on:
  workflow_dispatch:

defaults:
  run:
    shell: powershell

jobs:
  clone:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - uses: actions/checkout@v4

      - name: Check tools
        run: |
          git --version
          git xet version

      - name: Install Hugging Face CLI
        run: |
          python -m pip install -U "huggingface_hub[cli]"

      - name: Login to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf auth login --token $env:HF_TOKEN

      - name: Clone dataset
        run: |
          git clone https://huggingface.co/datasets/foursquare/fsq-os-places
